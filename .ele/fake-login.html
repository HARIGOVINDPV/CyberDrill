<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberDrill - Scenario 3</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(90deg, #0a0f1c, #14233b);
    color: white;
}
.main {
    flex: 1;
    display: flex;
}

/* LEFT HALF */
.left {
    width: 50%;
    padding: 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: linear-gradient(135deg, #0c1014, #0c1014);
}

.left h1 {
    font-size: 42px;
    line-height: 1.4;
}

.left span {
    background: linear-gradient(to right, #ff416c, #ff4b2b);
    -webkit-background-clip: text;
    color: transparent;
    font-weight: bold;
}

.left p {
    margin-top: 20px;
    color: #cbd5e1;
}

.simulation-tag {
    margin-top: 30px;
    color: #f87171;
    font-weight: bold;
    font-size: 14px;
}

/* RIGHT HALF */
.right {
    width: 50%;
    padding: 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background-color: #152127;
}

.right h2 {
    margin-bottom: 20px;
    font-weight: 500;
}

input {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #2c3e50;
    background: #1b2a41;
    color: white;
    font-size: 14px;
}

input:focus {
    outline: none;
    border-color: #3b82f6;
}

button {
    width: 100%;
    padding: 14px;
    background: #2563eb;
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s ease;
}

button:hover {
    background: #1d4ed8;
}

.links {
    margin-top: 15px;
    font-size: 13px;
    color: #94a3b8;
}

.links a {
    color: #3b82f6;
    text-decoration: none;
}

#result {
    margin-top: 20px;
}
.promo-img {
    width: 80%;
    margin-top: 40px;
    border-radius: 12px;
}

</style>
</head>

<body>

<div class="left">
    <h1>
        See everyday moments from your 
        <span>close friends.</span>
    </h1>
   <img src="igp.png" alt="App preview" class="promo-img">

    <div class="simulation-tag">
        ⚠ CyberDrill Phishing Simulation
    </div>
</div>

<div class="right">
    <h2>Log in</h2>

    <form id="phishForm">
        <input type="text" id="user" placeholder="Mobile number, username or email" required>
        <input type="password" id="pass" placeholder="Password" required>
        <button type="submit">Log in</button>
    </form>

    <div class="links">
        <p><a href="#">Forgot password?</a></p>
        <p style="margin-top:10px;">Don't have an account? <a href="#">Sign up</a></p>
    </div>

    <p id="result"></p>
</div>

<script>
document.getElementById("phishForm").addEventListener("submit", function(e){
    e.preventDefault();

    let username = document.getElementById("user").value;
    let password = document.getElementById("pass").value;

    console.log("Captured (Simulation):");
    console.log("Username:", username);
    console.log("Password:", password);

    document.getElementById("result").innerHTML = `
        <span style="color:#f87171; font-weight:bold;">
        ⚠ Attack Successful (Simulation)
        </span><br><br>
        Credentials were captured in this controlled demo.<br>
        This shows how phishing pages harvest login data.
    `;
});
</script>
<footer>
    <p>© 2026 CyberDrill | Phishing Simulation | For Educational Use Only</p>
</footer>
</body>

</html>
